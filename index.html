<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHEEL OF SIN - Vegas Pro Championship</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #020617;
            --accent-cyan: #06b6d4;
            --accent-magenta: #ff00ff;
            --accent-gold: #fbbf24;
            --accent-green: #22c55e;
            --border-color: #1e293b;
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, var(--panel-bg), var(--bg-color));
            color: white;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            user-select: none;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .title {
            font-size: 3.5rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: 6px;
            color: #fff;
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px var(--accent-magenta),
                0 0 40px var(--accent-magenta),
                0 0 80px var(--accent-magenta);
            animation: pulsate 1.5s infinite alternate;
        }

        @keyframes pulsate {
            100% {
                text-shadow: 
                0 0 4px #fff,
                0 0 11px #fff,
                0 0 19px var(--accent-magenta),
                0 0 40px var(--accent-magenta),
                0 0 80px var(--accent-magenta),
                0 0 100px var(--accent-magenta);
            }
            0% {
                text-shadow: 
                0 0 2px #fff,
                0 0 4px #fff,
                0 0 6px var(--accent-magenta),
                0 0 10px var(--accent-magenta),
                0 0 45px var(--accent-magenta),
                0 0 55px var(--accent-magenta);
            }
        }

        #game-container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 10px;
            box-sizing: border-box;
        }

        .canvas-wrapper {
            width: 100%;
            aspect-ratio: 5 / 3;
            background: var(--panel-bg);
            border: 4px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.15), inset 0 0 50px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
        }

        #slotCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            background: rgba(2, 6, 23, 0.8);
            border: 2px solid var(--border-color);
            padding: 15px 30px;
            box-sizing: border-box;
            border-radius: 12px;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }

        .stat-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #000;
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #334155;
            min-width: 150px;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-gold);
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.5);
        }

        .bet-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .bet-btn {
            background: #1e293b;
            border: 1px solid #475569;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 5px;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            font-family: 'Orbitron', sans-serif;
        }

        .bet-btn:hover { background: #334155; }
        .bet-btn:active { transform: scale(0.9); }

        #spinBtn {
            background: linear-gradient(180deg, var(--accent-green), #166534);
            border: 2px solid #4ade80;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            padding: 15px 60px;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(34, 197, 94, 0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.1s;
        }

        #spinBtn:hover {
            box-shadow: 0 0 40px rgba(34, 197, 94, 0.8);
            transform: translateY(-2px);
        }

        #spinBtn:active {
            transform: translateY(2px) scale(0.95);
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.5);
        }

        #spinBtn:disabled {
            background: #1e293b;
            border-color: #334155;
            color: #64748b;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* Bonus Modal Overlay */
        #bonus-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .modal-title {
            font-size: 3rem;
            color: var(--accent-gold);
            text-shadow: 0 0 20px var(--accent-gold);
            margin-bottom: 30px;
            animation: pulsateGold 1s infinite alternate;
        }

        @keyframes pulsateGold {
            0% { text-shadow: 0 0 10px var(--accent-gold); }
            100% { text-shadow: 0 0 30px #fff, 0 0 50px var(--accent-gold); }
        }

        .wheel-container {
            position: relative;
            width: 90vw;
            max-width: 600px;
            aspect-ratio: 1;
        }

        #wheelCanvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(251, 191, 36, 0.3);
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-top: 50px solid #ef4444;
            z-index: 10;
            filter: drop-shadow(0 0 15px #ef4444);
        }

        @media (max-width: 768px) {
            .title { font-size: 2rem; }
            #controls { flex-direction: column; gap: 20px; padding: 15px; }
            #spinBtn { width: 100%; font-size: 1.5rem; }
            .stat-box { width: 100%; flex-direction: row; justify-content: space-between; }
            .stat-label { margin-bottom: 0; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="title">WHEEL OF SIN</h1>
    </div>

    <div id="game-container">
        <div class="canvas-wrapper">
            <!-- Native canvas size is locked to 1000x600 for coordinate math. CSS scales it. -->
            <canvas id="slotCanvas" width="1000" height="600"></canvas>
        </div>

        <div id="controls">
            <div class="stat-box">
                <div class="stat-label">BALANCE</div>
                <div class="stat-value" id="balanceDisplay">$10,000</div>
            </div>

            <button id="spinBtn">SPIN</button>

            <div class="stat-box">
                <div class="stat-label">TOTAL BET</div>
                <div class="bet-controls">
                    <button class="bet-btn" id="betMinus">-</button>
                    <div class="stat-value" id="betDisplay">$100</div>
                    <button class="bet-btn" id="betPlus">+</button>
                </div>
            </div>
        </div>
    </div>

    <div id="bonus-modal">
        <div class="modal-title">BONUS WHEEL</div>
        <div class="wheel-container">
            <div class="pointer"></div>
            <canvas id="wheelCanvas" width="800" height="800"></canvas>
        </div>
    </div>

    <script>
        /**
         * VEGAS PRO CHAMPIONSHIP - WHEEL OF SIN
         * Core Engine, Vector Rendering & Web Audio Synth
         */

        // --- Core Configuration ---
        const SYMBOLS = { X: 0, WATCH: 1, VAULT: 2, DIAMOND: 3, WILD: 4, BONUS: 5 };
        const COLORS = ['#ff00ff', '#e2e8f0', '#fbbf24', '#06b6d4', '#22c55e', '#f97316'];
        const WEIGHTS = [40, 25, 15, 10, 5, 5]; // RNG Probabilities (%)

        const PAYLINES = [
            [1, 1, 1, 1, 1], // Middle
            [0, 0, 0, 0, 0], // Top
            [2, 2, 2, 2, 2], // Bottom
            [0, 1, 2, 1, 0], // V
            [2, 1, 0, 1, 2], // Inverted V
            [1, 0, 0, 0, 1],
            [1, 2, 2, 2, 1],
            [0, 0, 1, 2, 2],
            [2, 2, 1, 0, 0],
            [0, 2, 0, 2, 0]
        ];

        // Paytable multipliers for [3, 4, 5] matches
        const PAYTABLE = {
            [SYMBOLS.X]:       [2,   5,   15],
            [SYMBOLS.WATCH]:   [5,   15,  35],
            [SYMBOLS.VAULT]:   [10,  30,  75],
            [SYMBOLS.DIAMOND]: [25,  75,  250],
            [SYMBOLS.WILD]:    [50,  250, 1000]
        };

        const WHEEL_SEGMENTS = [2, 10, 5, 25, 2, 10, 5, 50, 2, 10, 5, 100];
        const NUM_SEGMENTS = WHEEL_SEGMENTS.length;
        const ARC = Math.PI * 2 / NUM_SEGMENTS;

        // --- Game State ---
        let balance = 10000;
        let currentBet = 100;
        let gameState = 'IDLE'; // IDLE, SPINNING, EVALUATE, BONUS
        let winningLines = [];
        let totalWin = 0;
        let bonusCount = 0;

        // --- DOM Elements ---
        const canvas = document.getElementById('slotCanvas');
        const ctx = canvas.getContext('2d');
        const wheelCanvas = document.getElementById('wheelCanvas');
        const wCtx = wheelCanvas.getContext('2d');
        
        const spinBtn = document.getElementById('spinBtn');
        const betMinus = document.getElementById('betMinus');
        const betPlus = document.getElementById('betPlus');
        const balanceDisplay = document.getElementById('balanceDisplay');
        const betDisplay = document.getElementById('betDisplay');
        const bonusModal = document.getElementById('bonus-modal');

        // --- Web Audio Context ---
        let audioCtx;
        let masterGain;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioCtx.createGain();
                masterGain.gain.value = 0.3;
                masterGain.connect(audioCtx.destination);
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const t = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(masterGain);

            if (type === 'stop') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(150, t);
                osc.frequency.exponentialRampToValueAtTime(30, t + 0.1);
                gain.gain.setValueAtTime(1, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
                osc.start(t);
                osc.stop(t + 0.1);
            } else if (type === 'tick') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(800, t);
                osc.frequency.exponentialRampToValueAtTime(200, t + 0.05);
                gain.gain.setValueAtTime(0.5, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.05);
                osc.start(t);
                osc.stop(t + 0.05);
            } else if (type === 'win') {
                const notes = [261.63, 329.63, 392.00, 523.25, 659.25]; // C4, E4, G4, C5, E5
                notes.forEach((freq, i) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.type = 'square';
                    o.frequency.value = freq;
                    o.connect(g);
                    g.connect(masterGain);
                    g.gain.setValueAtTime(0, t + i * 0.1);
                    g.gain.linearRampToValueAtTime(0.3, t + i * 0.1 + 0.05);
                    g.gain.exponentialRampToValueAtTime(0.01, t + i * 0.1 + 0.8);
                    o.start(t + i * 0.1);
                    o.stop(t + i * 0.1 + 0.8);
                });
            } else if (type === 'wheelEnd') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, t);
                osc.frequency.exponentialRampToValueAtTime(800, t + 0.5);
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(1, t + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 1.5);
                osc.start(t);
                osc.stop(t + 1.5);
            }
        }

        // --- Utility Math & RNG ---
        function formatMoney(num) {
            return '$' + num.toLocaleString();
        }

        function getRandomSymbol() {
            let r = Math.random() * 100;
            for (let i = 0; i < WEIGHTS.length; i++) {
                if (r < WEIGHTS[i]) return i;
                r -= WEIGHTS[i];
            }
            return 0;
        }

        // --- Rendering Engine ---
        function drawSymbolShape(ctx, sym, size) {
            ctx.beginPath();
            switch(sym) {
                case SYMBOLS.X:
                    ctx.moveTo(-size/3, -size/3); ctx.lineTo(size/3, size/3);
                    ctx.moveTo(size/3, -size/3); ctx.lineTo(-size/3, size/3);
                    break;
                case SYMBOLS.WATCH:
                    ctx.arc(0, 0, size/3.5, 0, Math.PI*2);
                    ctx.moveTo(-size/6, -size/3.5); ctx.lineTo(-size/6, -size/2);
                    ctx.moveTo(size/6, -size/3.5); ctx.lineTo(size/6, -size/2);
                    ctx.moveTo(-size/6, size/3.5); ctx.lineTo(-size/6, size/2);
                    ctx.moveTo(size/6, size/3.5); ctx.lineTo(size/6, size/2);
                    ctx.moveTo(0, 0); ctx.lineTo(size/8, -size/8); // hands
                    break;
                case SYMBOLS.VAULT:
                    ctx.rect(-size/2.5, -size/2.5, size/1.25, size/1.25);
                    ctx.moveTo(0, -size/6);
                    ctx.arc(0, 0, size/6, -Math.PI/2, Math.PI*1.5);
                    ctx.moveTo(-size/4, 0); ctx.lineTo(-size/6, 0);
                    ctx.moveTo(size/4, 0); ctx.lineTo(size/6, 0);
                    break;
                case SYMBOLS.DIAMOND:
                    ctx.moveTo(0, -size/2);
                    ctx.lineTo(size/2.5, -size/8);
                    ctx.lineTo(0, size/2.2);
                    ctx.lineTo(-size/2.5, -size/8);
                    ctx.closePath();
                    ctx.moveTo(-size/2.5, -size/8); ctx.lineTo(size/2.5, -size/8);
                    ctx.moveTo(0, -size/2); ctx.lineTo(0, -size/8);
                    break;
                case SYMBOLS.WILD:
                    ctx.moveTo(-size/2.2, size/3);
                    ctx.lineTo(size/2.2, size/3);
                    ctx.lineTo(size/2, -size/4);
                    ctx.lineTo(size/4, 0);
                    ctx.lineTo(0, -size/2);
                    ctx.lineTo(-size/4, 0);
                    ctx.lineTo(-size/2, -size/4);
                    ctx.closePath();
                    ctx.fillStyle = COLORS[sym];
                    ctx.fill();
                    ctx.fillStyle = '#000';
                    ctx.font = `900 ${size/4.5}px Orbitron`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText("WILD", 0, size/8);
                    break;
                case SYMBOLS.BONUS:
                    for(let i=0; i<5; i++) {
                        let angle = i * Math.PI * 2 / 5 - Math.PI/2;
                        let pX = Math.cos(angle) * size/2;
                        let pY = Math.sin(angle) * size/2;
                        if(i===0) ctx.moveTo(pX, pY);
                        else ctx.lineTo(pX, pY);
                        angle += Math.PI * 2 / 10;
                        pX = Math.cos(angle) * size/4;
                        pY = Math.sin(angle) * size/4;
                        ctx.lineTo(pX, pY);
                    }
                    ctx.closePath();
                    break;
            }
            if(sym !== SYMBOLS.WILD) ctx.stroke();
            else {
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        function drawSymbol(ctx, sym, x, y, size, isSpinning) {
            ctx.save();
            ctx.translate(x, y);

            const color = COLORS[sym];
            ctx.strokeStyle = color;
            ctx.lineWidth = 6;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            if (isSpinning) {
                // High speed pseudo-blur simulation
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 0.6;
                ctx.lineWidth = 4;
                ctx.scale(1, 1.2); // stretch vertically
            } else {
                ctx.shadowBlur = 20;
                ctx.shadowColor = color;
            }

            drawSymbolShape(ctx, sym, size);
            ctx.restore();
        }

        // --- Reel Physics & Logic ---
        class Reel {
            constructor(id) {
                this.id = id;
                this.symbols = [getRandomSymbol(), getRandomSymbol(), getRandomSymbol(), getRandomSymbol()];
                this.isSpinning = false;
                this.stopping = false;
                this.yOffset = 0;
                this.speed = 0;
                this.targetQueue = [];
            }

            spin() {
                this.isSpinning = true;
                this.stopping = false;
                this.speed = 35 + Math.random() * 15; // Kinetic variance
                this.targetQueue = [];
            }

            stopAt(targets) {
                // Target layout queue: [Bottom, Middle, Top, RandomPad]
                this.targetQueue = [targets[2], targets[1], targets[0], getRandomSymbol()];
                this.stopping = true;
            }

            update(cellHeight) {
                if (!this.isSpinning) return;

                this.yOffset += this.speed;

                if (this.yOffset >= cellHeight) {
                    this.yOffset -= cellHeight;

                    if (this.stopping) {
                        if (this.targetQueue.length > 0) {
                            this.symbols.unshift(this.targetQueue.shift());
                            this.symbols.pop();
                        } else {
                            // Queue empty -> Snap into place
                            this.isSpinning = false;
                            this.stopping = false;
                            this.yOffset = 0;
                            playSound('stop');
                        }
                    } else {
                        // Continuous spin loop
                        this.symbols.unshift(getRandomSymbol());
                        this.symbols.pop();
                    }
                }
            }
        }

        const reels = [new Reel(0), new Reel(1), new Reel(2), new Reel(3), new Reel(4)];

        // --- Game Loop ---
        function spinLogic() {
            if (balance < currentBet) {
                alert("Insufficient Balance! Refresh to reload.");
                return;
            }
            
            initAudio();
            balance -= currentBet;
            updateUI();

            // Pre-generate RNG result
            let finalGrid = []; 
            for (let c = 0; c < 5; c++) {
                finalGrid.push([getRandomSymbol(), getRandomSymbol(), getRandomSymbol()]);
            }

            reels.forEach(r => r.spin());
            gameState = 'SPINNING';
            winningLines = [];
            totalWin = 0;
            bonusCount = 0;
            spinBtn.disabled = true;

            // Evaluate matrix
            for(let c=0; c<5; c++) {
                for(let r=0; r<3; r++) {
                    if (finalGrid[c][r] === SYMBOLS.BONUS) bonusCount++;
                }
            }

            PAYLINES.forEach((line) => {
                let firstSym = finalGrid[0][line[0]];
                let matchCount = 1;
                let currentSym = firstSym;

                if (currentSym === SYMBOLS.BONUS) return;

                for (let c = 1; c < 5; c++) {
                    let sym = finalGrid[c][line[c]];
                    if (sym === currentSym || sym === SYMBOLS.WILD || currentSym === SYMBOLS.WILD) {
                        if (currentSym === SYMBOLS.WILD && sym !== SYMBOLS.WILD && sym !== SYMBOLS.BONUS) {
                            currentSym = sym; 
                        }
                        matchCount++;
                    } else {
                        break;
                    }
                }

                if (matchCount >= 3) {
                    let payoutSym = currentSym === SYMBOLS.WILD ? SYMBOLS.WILD : currentSym;
                    let multiplier = PAYTABLE[payoutSym][matchCount - 3];
                    let winAmt = currentBet * multiplier;
                    totalWin += winAmt;
                    winningLines.push({ line, winAmt, matchCount });
                }
            });

            // Sequence stopping left-to-right
            reels.forEach((reel, i) => {
                setTimeout(() => {
                    reel.stopAt(finalGrid[i]);
                }, 400 + i * 350); 
            });
        }

        function handleSpinComplete() {
            spinBtn.disabled = false;
            
            if (totalWin > 0) {
                balance += totalWin;
                playSound('win');
            }
            updateUI();

            if (bonusCount >= 3) {
                gameState = 'BONUS';
                setTimeout(triggerBonusWheel, 1000);
            } else {
                gameState = 'IDLE';
            }
        }

        function updateUI() {
            balanceDisplay.innerText = formatMoney(balance);
            betDisplay.innerText = formatMoney(currentBet);
        }

        // --- Main Render Loop ---
        function drawSlotCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw inner grid structure
            ctx.strokeStyle = '#1e293b';
            ctx.lineWidth = 3;
            ctx.shadowBlur = 0;
            for(let i=1; i<5; i++) {
                ctx.beginPath();
                ctx.moveTo(i*200, 0);
                ctx.lineTo(i*200, 600);
                ctx.stroke();
            }

            // Draw Reels
            reels.forEach(reel => {
                ctx.save();
                ctx.beginPath();
                ctx.rect(reel.id * 200, 0, 200, 600);
                ctx.clip(); // Masking

                for(let i=0; i<reel.symbols.length; i++) {
                    let sym = reel.symbols[i];
                    let y = (i - 1) * 200 + reel.yOffset;
                    drawSymbol(ctx, sym, reel.id * 200 + 100, y + 100, 140, reel.isSpinning);
                }
                ctx.restore();
            });

            // Draw Winning Lines & Notifications
            if (gameState === 'IDLE' && winningLines.length > 0) {
                let pulse = 0.6 + Math.sin(Date.now() / 150) * 0.4;
                
                winningLines.forEach(win => {
                    ctx.shadowBlur = 25;
                    ctx.shadowColor = '#fff';
                    ctx.strokeStyle = `rgba(255, 255, 255, ${pulse})`;
                    ctx.lineWidth = 10;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    
                    ctx.beginPath();
                    for(let c=0; c<win.matchCount; c++) {
                        let r = win.line[c];
                        let cx = c * 200 + 100;
                        let cy = r * 200 + 100;
                        if (c === 0) ctx.moveTo(cx, cy);
                        else ctx.lineTo(cx, cy);
                    }
                    ctx.stroke();
                });

                // Total Win Overlay Float
                ctx.shadowBlur = 30;
                ctx.shadowColor = '#fbbf24';
                ctx.fillStyle = '#fbbf24';
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 5;
                ctx.font = '900 80px Orbitron';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                let msg = `WIN ${formatMoney(totalWin)}!`;
                
                ctx.strokeText(msg, 500, 300);
                ctx.fillText(msg, 500, 300);
            }
        }

        function gameLoop() {
            if (gameState === 'SPINNING') {
                reels.forEach(r => r.update(200));
                
                // Detect completion
                if (!reels.some(r => r.isSpinning)) {
                    gameState = 'EVALUATE';
                    handleSpinComplete();
                }
            }
            drawSlotCanvas();
            requestAnimationFrame(gameLoop);
        }

        // --- Bonus Wheel Modal ---
        let wheelAngle = 0;
        let wheelVel = 0;
        let wheelActive = false;
        let lastSegment = 0;
        let wheelWinAmt = 0;

        function drawBonusWheel() {
            wCtx.clearRect(0, 0, 800, 800);
            wCtx.save();
            wCtx.translate(400, 400); // Center
            wCtx.rotate(wheelAngle);

            for(let i=0; i<NUM_SEGMENTS; i++) {
                wCtx.beginPath();
                wCtx.moveTo(0,0);
                wCtx.arc(0, 0, 380, i*ARC, (i+1)*ARC);
                wCtx.fillStyle = i % 2 === 0 ? '#1e293b' : '#334155'; // Alternate dark slate
                wCtx.fill();
                
                wCtx.strokeStyle = '#fbbf24'; // Gold separator
                wCtx.lineWidth = 4;
                wCtx.stroke();

                wCtx.save();
                wCtx.rotate(i*ARC + ARC/2);
                wCtx.translate(320, 0); 
                wCtx.rotate(Math.PI/2); // Make text upright when at the top (-90 deg)
                wCtx.textAlign = 'center';
                wCtx.textBaseline = 'middle';
                wCtx.fillStyle = WHEEL_SEGMENTS[i] >= 50 ? '#ff00ff' : '#06b6d4'; // Highlight big wins
                wCtx.shadowBlur = 10;
                wCtx.shadowColor = wCtx.fillStyle;
                wCtx.font = '900 40px Orbitron';
                wCtx.fillText('x' + WHEEL_SEGMENTS[i], 0, 0);
                wCtx.restore();
            }
            wCtx.restore();

            // Center hub
            wCtx.beginPath();
            wCtx.arc(400, 400, 40, 0, Math.PI*2);
            wCtx.fillStyle = '#fbbf24';
            wCtx.fill();
            wCtx.strokeStyle = '#000';
            wCtx.lineWidth = 8;
            wCtx.stroke();

            // Draw internal Win Text if stopped
            if (!wheelActive && wheelWinAmt > 0) {
                wCtx.fillStyle = 'rgba(0,0,0,0.85)';
                wCtx.fillRect(0,0,800,800);
                
                wCtx.font = '900 80px Orbitron';
                wCtx.textAlign = 'center';
                wCtx.textBaseline = 'middle';
                wCtx.fillStyle = '#22c55e';
                wCtx.shadowBlur = 30;
                wCtx.shadowColor = '#22c55e';
                wCtx.fillText(`WON ${formatMoney(wheelWinAmt)}!`, 400, 400);
            }
        }

        function updateWheelLoop() {
            if (wheelActive) {
                wheelAngle += wheelVel;
                wheelVel *= 0.993; // Friction Curve

                // Calculate current segment (pointer is at Top / -PI/2)
                let normAngle = wheelAngle % (Math.PI*2);
                if (normAngle < 0) normAngle += Math.PI*2;
                let offsetAngle = (Math.PI*2 - normAngle - Math.PI/2) % (Math.PI*2);
                if (offsetAngle < 0) offsetAngle += Math.PI*2;
                
                let currentSeg = Math.floor(offsetAngle / ARC);

                if (currentSeg !== lastSegment) {
                    playSound('tick');
                    lastSegment = currentSeg;
                }

                if (wheelVel < 0.001) {
                    // Wheel Stopped
                    wheelActive = false;
                    let winMult = WHEEL_SEGMENTS[currentSeg];
                    wheelWinAmt = currentBet * winMult;
                    balance += wheelWinAmt;
                    updateUI();
                    playSound('wheelEnd');
                    
                    setTimeout(() => {
                        bonusModal.style.display = 'none';
                        wheelWinAmt = 0;
                        gameState = 'IDLE';
                    }, 4000); // Wait 4 seconds to show win amount
                }
            }
            
            drawBonusWheel();

            if (gameState === 'BONUS') {
                requestAnimationFrame(updateWheelLoop);
            }
        }

        function triggerBonusWheel() {
            bonusModal.style.display = 'flex';
            wheelAngle = 0;
            wheelWinAmt = 0;
            wheelActive = true;
            wheelVel = Math.random() * 0.15 + 0.35; // Random spin power
            requestAnimationFrame(updateWheelLoop);
        }

        // --- Event Listeners ---
        spinBtn.addEventListener('click', () => {
            if (gameState === 'IDLE') spinLogic();
        });

        betMinus.addEventListener('click', () => {
            if (currentBet > 10 && gameState === 'IDLE') {
                initAudio();
                currentBet -= 10;
                updateUI();
            }
        });

        betPlus.addEventListener('click', () => {
            if (currentBet < 1000 && gameState === 'IDLE') {
                initAudio();
                currentBet += 10;
                updateUI();
            }
        });

        // Initialize Render Frame
        drawSlotCanvas();
        requestAnimationFrame(gameLoop);

    </script>
</body>
</html>
