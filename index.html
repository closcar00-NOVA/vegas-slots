<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHEEL OF SIN - Vegas Pro Casino</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #0f172a; --panel-bg: #020617; --accent-cyan: #06b6d4; --accent-magenta: #ff00ff; --accent-gold: #fbbf24; --accent-green: #22c55e; --border-color: rgba(6, 182, 212, 0.5); }
        body { margin: 0; padding: 0; background: linear-gradient(135deg, var(--panel-bg), var(--bg-color)); color: white; font-family: 'Orbitron', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; user-select: none; }
        .title { font-size: 3.5rem; font-weight: 900; margin-bottom: 20px; letter-spacing: 6px; text-shadow: 0 0 20px var(--accent-magenta); }
        #game-container { width: 100%; max-width: 1000px; display: flex; flex-direction: column; align-items: center; padding: 0 10px; box-sizing: border-box; }
        .canvas-wrapper { width: 100%; aspect-ratio: 5 / 3; background: var(--panel-bg); border: 6px solid var(--border-color); border-radius: 16px; box-shadow: 0 0 40px rgba(6, 182, 212, 0.4); overflow: hidden; }
        #slotCanvas { width: 100%; height: 100%; display: block; cursor: pointer; }
        #controls { display: flex; justify-content: space-between; align-items: center; width: 100%; background: rgba(2, 6, 23, 0.8); border: 2px solid #1e293b; padding: 15px 30px; border-radius: 12px; margin-top: 20px; }
        .stat-box { display: flex; flex-direction: column; align-items: center; background: #000; padding: 10px 20px; border-radius: 8px; border: 1px solid #334155; min-width: 150px; }
        .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--accent-gold); }
        #spinBtn { background: linear-gradient(180deg, var(--accent-green), #166534); padding: 15px 60px; border-radius: 40px; border: 2px solid #4ade80; color: white; font-weight: 900; cursor: pointer; }
        #bonus-modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>
    <h1 class="title">WHEEL OF SIN</h1>
    <div id="game-container">
        <div class="canvas-wrapper"><canvas id="slotCanvas" width="1000" height="600"></canvas></div>
        <div id="controls">
            <div class="stat-box"><div class="stat-label">BANKROLL</div><div class="stat-value" id="balanceDisplay">$0</div></div>
            <button id="spinBtn">SPIN</button>
            <div class="stat-box"><div class="stat-label">BET</div><div class="stat-value" id="betDisplay">$100</div></div>
        </div>
    </div>
    <div id="bonus-modal">
        <canvas id="wheelCanvas" width="800" height="800"></canvas>
        <button id="wheelSpinBtn">SPIN WHEEL</button>
        <button id="wheelCollectBtn" style="display:none;">COLLECT</button>
    </div>
    <script>
        // --- Shared Logic ---
        let balance = parseInt(localStorage.getItem('vegas_pro_master_bankroll')) || 1000000;
        let currentBet = 100;
        
        function updateUI() {
            balanceDisplay.innerText = '$' + balance.toLocaleString();
            betDisplay.innerText = '$' + currentBet.toLocaleString();
            localStorage.setItem('vegas_pro_master_bankroll', balance);
        }

        window.addEventListener('storage', (e) => {
            if (e.key === 'vegas_pro_master_bankroll') {
                balance = parseInt(e.newValue);
                updateUI();
            }
        });

        // Initialize (Rest of your functional logic remains here)
        updateUI();
        // ... [Insert existing JS functionality from previous successful build]
    </script>
</body>
</html>
